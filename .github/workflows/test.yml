name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Write master.key
        run: echo "${{ secrets.MASTER_KEY }}" > master.key

      - name: Run RSpec
        run: bundle exec rspec
